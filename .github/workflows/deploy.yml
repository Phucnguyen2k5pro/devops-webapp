name: CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: docker build -t phuc2k5bk/devops-app:latest .

    - name: Push image
      run: docker push phuc2k5bk/devops-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull phuc2k5bk/devops-app:latest
          docker stop app || true
          docker rm app || true
          docker run -d \
            -p 3000:3000 \
            --name app \
            --restart=always \
            phuc2k5bk/devops-app:latest
