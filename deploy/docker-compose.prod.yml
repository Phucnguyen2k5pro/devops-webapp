services:
  app:
    image: ${WEB_IMAGE}
    container_name: devops-webapp-app
    restart: unless-stopped
    expose:
      - "3000"    
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/products_db
    volumes:
      - uploads_data:/app/public/uploads

    depends_on:
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - app_net
      - monitoring_net

  mongo:
    image: mongo:6.0
    container_name: devops-webapp-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  caddy:
    image: caddy:2.8-alpine
    container_name: devops-webapp-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - app_net
      - monitoring_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: devops-webapp-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: devops-webapp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - monitoring_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: devops-webapp-cadvisor
    restart: unless-stopped
    privileged: true
    cgroup: host
    command:
      - "--housekeeping_interval=10s"
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run:/run:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - monitoring_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: devops-webapp-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - monitoring_net

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  app_net:
    driver: bridge
  monitoring_net:
    driver: bridge
